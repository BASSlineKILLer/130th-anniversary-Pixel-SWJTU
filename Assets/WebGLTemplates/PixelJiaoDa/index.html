<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    body { padding: 0; margin: 0; overflow: hidden; }
    #unity-container { position: fixed; width: 100%; height: 100%; }
    #unity-canvas { width: 100%; height: 100%; background: #FFFFFF; }
    #unity-loading-bar {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      display: none; flex-direction: column; align-items: center;
    }
    #unity-progress-bar-empty {
      width: 200px; height: 10px; background: #ddd; border-radius: 5px; margin-top: 10px;
    }
    #unity-progress-bar-full {
      width: 0%; height: 100%; background: #4CAF50; border-radius: 5px; transition: width 0.2s;
    }
    #unity-warning { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #ffeb3b; padding: 10px; border-radius: 5px; display: none; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
    <div id="unity-loading-bar">
      <div>加载中...</div>
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>
    <div id="unity-warning"></div>
  </div>

  <script>
    // WebGL 配置 - 高分屏优化
    var maxDevicePixelRatio = 1.25;
    var unityInstance = null;
    
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    // 显示警告/错误信息
    function unityShowBanner(msg, type) {
      warningBanner.style.display = 'block';
      warningBanner.innerHTML = msg;
      if (type === 'error') warningBanner.style.background = '#ff4444';
      else if (type === 'warning') warningBanner.style.background = '#ffeb3b';
    }

    // 限制 DPR 并手动控制 canvas 尺寸
    function resizeUnityCanvas() {
      var ratio = Math.min(window.devicePixelRatio || 1, maxDevicePixelRatio);
      var width = Math.max(1, Math.floor(canvas.clientWidth * ratio));
      var height = Math.max(1, Math.floor(canvas.clientHeight * ratio));
      if (canvas.width !== width) canvas.width = width;
      if (canvas.height !== height) canvas.height = height;
      return ratio;
    }

    // 通知 Unity 页面可见性变化（用于音频暂停/恢复）
    function notifyUnityVisibility(isVisible) {
      if (!unityInstance) return;
      unityInstance.SendMessage("WebGLRuntimeBridge", "OnBrowserVisibilityChanged", isVisible ? "1" : "0");
    }

    // 监听页面事件
    window.addEventListener("resize", resizeUnityCanvas);
    document.addEventListener("visibilitychange", function () {
      notifyUnityVisibility(!document.hidden);
    });
    window.addEventListener("focus", function () { notifyUnityVisibility(true); });
    window.addEventListener("blur", function () { notifyUnityVisibility(false); });

    // 移动端适配
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
    }

    // Unity 配置
    var buildUrl = "Build";
    var config = {
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      showBanner: unityShowBanner,
    };

    // 关闭自动 DPR 同步，使用我们的自定义逻辑
    config.matchWebGLToCanvasSize = false;
    config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, maxDevicePixelRatio);

    // 初始化 canvas 尺寸
    resizeUnityCanvas();

    // 显示加载条
    loadingBar.style.display = "flex";

    // 加载 Unity
    var script = document.createElement("script");
    script.src = buildUrl + "/{{{ LOADER_FILENAME }}}";
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((instance) => {
        unityInstance = instance;
        window.unityInstance = instance;
        loadingBar.style.display = "none";
        resizeUnityCanvas();
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
